spring:
  application:
    name: caseaxis-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/caseaxis}
    username: ${DB_USERNAME:caseaxis}
    password: ${DB_PASSWORD:caseaxis}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: CaseAxisPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: false
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

application:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:https://caseaxis.pulse-forge.com,https://staging.caseaxis.pulse-forge.com}
    login-rate-limit:
      enabled: ${LOGIN_RATE_LIMIT_ENABLED:true}
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.caseaxis: INFO
    org.flywaydb: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
